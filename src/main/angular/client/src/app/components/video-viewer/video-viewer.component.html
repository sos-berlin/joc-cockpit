<div class="modal-header">
  <h4 class="modal-title">
    <i class="fa fa-play-circle m-r-xs text-primary"></i>
    {{ displayTitle }}
  </h4>
  <button type="button" class="close" aria-label="Close" (click)="cancel()">
    <span aria-hidden="true" class="fa fa-times-circle"></span>
  </button>
</div>

<div class="modal-body p-a">
  @if (isLoading) {
    <div class="col-md-12 text-center">
      <div class="loading-center text-primary text ht-260">
        <div><i class="fa fa-refresh fa-lg fa-spin"></i></div>
      </div>
    </div>
  } @else if (notFound) {
    <nz-result nzStatus="404" nzTitle="404" nzSubTitle="{{ 'common.message.noVideoData' | translate }}">
    </nz-result>
  } @else {
    @if (entry?.description) {
      <p class="video-description text-muted m-b-sm">{{ entry.description }}</p>
    }
    <div class="video-responsive-wrapper">
      <iframe
        [src]="embedUrl"
        [title]="displayTitle"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  }
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-sm btn-grey" (click)="cancel()">
    <span translate>common.button.close</span>
  </button>
</div>
