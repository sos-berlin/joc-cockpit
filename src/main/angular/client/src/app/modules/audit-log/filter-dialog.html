<div class="modal-header">
  <h4 class="modal-title">
    @if (new) {
      <span >{{ 'customization.label.createCustomization' | translate }}</span>
    }
    @if (edit) {
      <span >{{ 'customization.label.updateCustomization' | translate }}</span>
    }
    @if (!new && !edit) {
      <span >{{ 'customization.label.copyCustomization' | translate }}</span>
    }
    @if (name) {
      <span>: {{name}}</span>
    }
  </h4>
  <button (click)="activeModal.destroy()" aria-label="Close" class="close" type="button">
    <span aria-hidden="true" class="fa fa-times-circle"></span>
  </button>
</div>
<app-form-template (onCancel)="cancel($event)" [allFilter]="allFilter" [filter]="filter" [permission]="permission"
                   [preferences]="preferences" [schedulerIds]="schedulerIds"></app-form-template>
