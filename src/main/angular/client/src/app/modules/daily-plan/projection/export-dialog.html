<div class="modal-header">
  <h4 class="modal-title">
    <span>{{ 'inventory.label.export' | translate }}</span>
  </h4>
  <button (click)="cancel()" aria-label="Close" class="close" type="button">
    <span aria-hidden="true" class="fa fa-times-circle"></span>
  </button>
</div>

<form #myForm="ngForm" (ngSubmit)="onSubmit()" spellcheck="false">
  <div class="modal-body p-a">
    <div class="form-group row">
      <label class="col-md-3 form-control-label">
        <span [appRichTooltip]="'dailyPlan.tooltip.startDate' | translate">{{ 'common.placeholder.startDate' | translate }}</span>
        <sup class="text-danger text-sm">*</sup>
      </label>
      <div class="col-md-2">
        <nz-date-picker [(ngModel)]="filter.dateFrom" [nzAllowClear]="false" [nzFormat]="dateFormat"
                        name="from" required></nz-date-picker>
      </div>
      <label class="col-md-2 form-control-label">
        <span [appRichTooltip]="'dailyPlan.tooltip.endDate' | translate">{{ 'common.placeholder.endDate' | translate }}</span>
        <sup class="text-danger text-sm">*</sup>
      </label>
      <div class="col-md-2">
        <nz-date-picker [(ngModel)]="filter.dateTo" [nzAllowClear]="false" [nzFormat]="dateFormat"
                        name="to" required></nz-date-picker>
      </div>
    </div>
    <div class="form-group row">
      <label class="col-md-3 form-control-label">
        <span [appRichTooltip]="'dailyPlan.tooltip.projection.export.workflows' | translate">{{ 'dailyPlan.label.workflows' | translate }}</span>
      </label>
      <div class="col-md-6">
        <app-multi-select [addFolderPossible]="true" [attribute]="'workflowPaths'" [folders]="filter" [list]="filter"
                          [nodes]="workflowTree" [pathAttribute]="'workflowFolders'"
                          [type]="'WORKFLOW'"></app-multi-select>
      </div>
    </div>
    @if (filter.workflowFolders?.length > 0) {
      <div class="form-group row">
        <label class="col-md-3">
          <span [appRichTooltip]="'dailyPlan.tooltip.projection.export.workflowFolders' | translate">{{ 'dailyPlan.label.workflowFolders' | translate }}</span>
        </label>
        <div class="col-md-6" style="max-height: 140px; overflow: auto">
          @for (path of filter.workflowFolders; track path) {
            <div>
              <span>{{path}}</span>
              <i (click)="remove(path, true)" class="pull-right pos-rel t-xs fa fa-remove text-hover-primary"></i>
            </div>
          }
        </div>
      </div>
    }
    <div class="form-group row">
      <label class="col-md-3 form-control-label">
        <span [appRichTooltip]="'dailyPlan.tooltip.projection.export.schedules' | translate">{{ 'dailyPlan.label.schedules' | translate }}</span>
      </label>
      <div class="col-md-6">
        <app-multi-select [addFolderPossible]="true" [attribute]="'schedulePaths'" [folders]="filter" [list]="filter"
                          [nodes]="scheduleTree" [pathAttribute]="'scheduleFolders'"
                          [type]="'SCHEDULE'"></app-multi-select>
      </div>
    </div>
    @if (filter.scheduleFolders?.length > 0) {
      <div class="form-group row">
        <label class="col-md-3">
          <span [appRichTooltip]="'dailyPlan.tooltip.projection.export.scheduleFolders' | translate">{{ 'dailyPlan.label.scheduleFolders' | translate }}</span>
        </label>
        <div class="col-md-6" style="max-height: 140px; overflow: auto">
          @for (path of filter.scheduleFolders; track path) {
            <div>
              <span class="">{{path}}</span>
              <i (click)="remove(path)" class="pull-right pos-rel t-xs fa fa-remove text-hover-primary"></i>
            </div>
          }
        </div>
      </div>
    }
    <div class="form-group row ">
      <label class="col-md-3">
        <span [appRichTooltip]="'dailyPlan.tooltip.projection.export.invertProjection' | translate">{{ 'dailyPlan.label.invertProjection' | translate }}</span>
      </label>
      <div class="col-md-6">
        <label [(ngModel)]="filter.withoutStartTime" name="late" nz-checkbox></label>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button [disabled]="!myForm.form.valid || submitted" class="btn btn-primary btn-sm"
            type="submit">
      @if (submitted) {
        <i class="fa fa-spin fa-spinner"></i>
      }
      {{'common.button.submit' | translate}}
    </button>
    <button (click)="cancel()" class="btn btn-grey btn-sm" type="button">
      {{ 'common.button.cancel' | translate }}
    </button>
  </div>
</form>
